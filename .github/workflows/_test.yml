name: "Módulo — Test"

on:
  workflow_call:
    inputs:
      dotnet-version:
        description: "Versión del SDK de .NET"
        type: string
        default: "10.0.x"

permissions:
  contents: read

jobs:
  test:
    name: Tests unitarios y cobertura
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configurar .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Caché de paquetes NuGet
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restaurar dependencias
        run: dotnet restore

      - name: Compilar solución
        run: dotnet build --configuration Release --no-restore

      - name: Ejecutar tests con cobertura
        run: |
          dotnet test \
            --no-build \
            --configuration Release \
            --logger "trx;LogFilePrefix=results" \
            /p:CollectCoverage=true \
            /p:CoverletOutput=TestResults/coverage.opencover.xml \
            /p:CoverletOutputFormat=opencover

      - name: Publicar resumen en GitHub Actions
        if: always()
        run: |
          echo "## 🧪 Tests unitarios y cobertura" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Contadores desde archivos TRX generados por --logger trx
          PASSED=$(find . -name "*.trx" -path "*/TestResults/*" \
            -exec grep -o 'passed="[0-9]*"' {} \; 2>/dev/null | grep -o '[0-9]*' | awk '{s+=$1} END{print s+0}')
          FAILED=$(find . -name "*.trx" -path "*/TestResults/*" \
            -exec grep -o 'failed="[0-9]*"' {} \; 2>/dev/null | grep -o '[0-9]*' | awk '{s+=$1} END{print s+0}')
          SKIPPED=$(find . -name "*.trx" -path "*/TestResults/*" \
            -exec grep -o 'notExecuted="[0-9]*"' {} \; 2>/dev/null | grep -o '[0-9]*' | awk '{s+=$1} END{print s+0}')

          COVERAGE_FILE=$(find . -name "coverage.opencover.xml" ! -path "*/bin/*" ! -path "*/obj/*" | head -n1)
          if [ -f "$COVERAGE_FILE" ]; then
            VISITED=$(grep -o 'visitedSequencePoints="[0-9]*"' "$COVERAGE_FILE" | grep -o '[0-9]*' | head -n1)
            TOTAL=$(grep -o 'numSequencePoints="[0-9]*"' "$COVERAGE_FILE" | grep -o '[0-9]*' | head -n1)
            if [ "${TOTAL:-0}" -gt 0 ]; then
              COVERAGE_PCT=$(awk "BEGIN {printf \"%.1f\", ($VISITED/$TOTAL)*100}")
            else
              COVERAGE_PCT="N/A"
            fi
          else
            COVERAGE_PCT="N/A"
          fi

          echo "| Métrica | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Passed | **${PASSED:-0}** |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ Failed | **${FAILED:-0}** |" >> $GITHUB_STEP_SUMMARY
          echo "| ⏭ Skipped | **${SKIPPED:-0}** |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧮 Cobertura | **${COVERAGE_PCT}%** |" >> $GITHUB_STEP_SUMMARY

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: "**/TestResults/coverage.opencover.xml"
          retention-days: 1
          if-no-files-found: error
