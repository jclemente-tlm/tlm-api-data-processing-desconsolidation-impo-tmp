name: "Módulo — Scan Contenedor (Trivy)"

on:
  workflow_call:
    inputs:
      dotnet-version:
        description: "Versión del SDK de .NET"
        type: string
        default: "10.0.x"

permissions:
  contents: read

jobs:
  scan-trivy:
    name: Scan Contenedor — Trivy
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ${{ github.event.repository.name }}

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v6

      - name: Configurar .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Caché de paquetes NuGet
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restaurar dependencias
        run: dotnet restore

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Instalar Trivy
        run: |
          sudo apt-get update -y -qq
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      - name: Caché de base de datos Trivy
        uses: actions/cache@v5
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}
          restore-keys: trivy-db-${{ runner.os }}-

      - name: Crear directorio de reportes y template HTML
        run: |
          mkdir -p trivy-reports trivy-templates
          wget -q -O trivy-templates/html.tpl https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl

      - name: Trivy — Scan de filesystem (config)
        run: |
          trivy fs --scanners config \
            --format json \
            -o trivy-reports/fs-scan.json .

          trivy convert \
            --format template --template "@trivy-templates/html.tpl" \
            -o trivy-reports/fs-scan.html \
            trivy-reports/fs-scan.json

          CRITICAL=$(jq '[.Results[]? | (.Misconfigurations // [])[]? | select(.Severity=="CRITICAL")] | length' trivy-reports/fs-scan.json)
          if [ "$CRITICAL" -gt 0 ]; then
            echo "⛔ Trivy fs encontró $CRITICAL misconfiguration(s) CRÍTICA(s)."
            exit 1
          fi

      - name: Construir imagen Docker para scan
        run: |
          IMAGE=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
          docker build -t ${IMAGE}:ci-scan .
          echo "IMAGE_TAG=${IMAGE}:ci-scan" >> $GITHUB_ENV

      - name: Trivy — Scan de imagen (vuln + secret)
        run: |
          trivy image --scanners vuln,secret \
            --ignore-unfixed \
            --format json \
            -o trivy-reports/image-scan.json ${IMAGE_TAG}

          trivy convert \
            --format template --template "@trivy-templates/html.tpl" \
            -o trivy-reports/image-scan.html \
            trivy-reports/image-scan.json

          CRITICAL=$(jq '[.Results[]? | (.Vulnerabilities // [])[]? | select(.Severity=="CRITICAL")] | length' trivy-reports/image-scan.json)
          if [ "$CRITICAL" -gt 0 ]; then
            echo "⛔ Trivy image encontró $CRITICAL vulnerabilidad(es) CRÍTICA(s)."
            exit 1
          fi

      - name: Publicar resumen en GitHub Actions
        if: always()
        run: |
          echo "## 🔒 Trivy Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for report in trivy-reports/*.json; do
            [ -f "$report" ] || continue
            NAME=$(basename "$report")
            TOTAL=$(jq '[.Results[]? | (.Vulnerabilities // [])[]?] | length' "$report")
            CRIT=$(jq '[.Results[]? | (.Vulnerabilities // [])[]? | select(.Severity=="CRITICAL")] | length' "$report")
            HIGH=$(jq '[.Results[]? | (.Vulnerabilities // [])[]? | select(.Severity=="HIGH")] | length' "$report")
            MED=$(jq '[.Results[]? | (.Vulnerabilities // [])[]? | select(.Severity=="MEDIUM")] | length' "$report")
            LOW=$(jq '[.Results[]? | (.Vulnerabilities // [])[]? | select(.Severity=="LOW")] | length' "$report")
            INFO=$(jq '[.Results[]? | (.Vulnerabilities // [])[]? | select(.Severity=="UNKNOWN" or .Severity=="NONE")] | length' "$report")
            echo "### 📄 $NAME" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Severidad | Conteo |" >> $GITHUB_STEP_SUMMARY
            echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
            echo "| 🔴 CRITICAL | $CRIT |" >> $GITHUB_STEP_SUMMARY
            echo "| 🟠 HIGH | $HIGH |" >> $GITHUB_STEP_SUMMARY
            echo "| 🟡 MEDIUM | $MED |" >> $GITHUB_STEP_SUMMARY
            echo "| 🔵 LOW | $LOW |" >> $GITHUB_STEP_SUMMARY
            echo "| ⚪ INFO/UNKNOWN | $INFO |" >> $GITHUB_STEP_SUMMARY
            echo "| **TOTAL** | **$TOTAL** |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          done

      - name: Subir reporte FS
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: reporte-trivy-fs
          path: |
            trivy-reports/fs-scan.html
            trivy-reports/fs-scan.json

      - name: Subir reporte Image
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: reporte-trivy-image
          path: |
            trivy-reports/image-scan.html
            trivy-reports/image-scan.json

      - name: Comprimir todos los reportes
        if: always()
        run: zip -r trivy-all-reports.zip trivy-reports/

      - name: Subir ZIP con todos los reportes
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: reporte-trivy-completo
          path: trivy-all-reports.zip
