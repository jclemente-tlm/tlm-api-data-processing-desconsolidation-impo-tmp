name: "Módulo — Scan IaC (terraform validate + Checkov)"

on:
  workflow_call:

permissions:
  contents: read

jobs:
  scan-iac:
    name: Scan IaC — terraform validate + Checkov
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v6

      - name: Configurar Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init (sin backend)
        working-directory: ./iac
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ./iac
        run: |
          OUTPUT=$(terraform validate -json)
          VALID=$(echo "$OUTPUT" | jq '.valid')
          ERROR_COUNT=$(echo "$OUTPUT" | jq '.error_count')
          WARNING_COUNT=$(echo "$OUTPUT" | jq '.warning_count')

          {
            echo "## 🏗️ Terraform Validate"
            echo ""
            echo "| Resultado | Conteo |"
            echo "|-----------|--------|"
            if [ "$VALID" = "true" ]; then
              echo "| ✅ Válido | — |"
            else
              echo "| ❌ Inválido | — |"
            fi
            echo "| ❌ Errores | **$ERROR_COUNT** |"
            echo "| ⚠️ Advertencias | **$WARNING_COUNT** |"

            if [ "$ERROR_COUNT" -gt 0 ]; then
              echo ""
              echo "### Errores"
              echo ""
              echo "\`\`\`"
              echo "$OUTPUT" | jq -r '.diagnostics[] | select(.severity == "error") | "\(.severity | ascii_upcase): \(.summary)\n  \(.detail)"'
              echo "\`\`\`"
            fi
          } >> $GITHUB_STEP_SUMMARY

          if [ "$VALID" != "true" ]; then
            echo "⛔ Terraform validate encontró errores."
            exit 1
          fi

      - name: Ejecutar Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: iac
          soft_fail: false
          output_format: json
          output_file_path: checkov-report.json

      - name: Publicar resumen en GitHub Actions
        if: always()
        run: |
          if [ -f "checkov-report.json" ]; then
            JSON_PATH="checkov-report.json"
          elif [ -f "checkov-report.json/results_json.json" ]; then
            JSON_PATH="checkov-report.json/results_json.json"
          else
            echo "No se encontró archivo JSON de Checkov"
            exit 1
          fi

          PASSED=$(jq '.summary.passed' $JSON_PATH)
          FAILED=$(jq '.summary.failed' $JSON_PATH)
          SKIPPED=$(jq '.summary.skipped' $JSON_PATH)
          TOTAL=$(( ${PASSED:-0} + ${FAILED:-0} + ${SKIPPED:-0} ))

          {
            echo "## 🛡️ Checkov IaC Security Scan"
            echo ""
            echo "| Resultado | Conteo |"
            echo "|----------|--------|"
            echo "| ✅ Passed | **$PASSED** |"
            echo "| ❌ Failed | **$FAILED** |"
            echo "| ⚠️ Skipped | **$SKIPPED** |"
            echo "| TOTAL | **$TOTAL** |"
          } >> $GITHUB_STEP_SUMMARY

      - name: Subir reporte Checkov
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: reporte-checkov
          path: checkov-report.json
