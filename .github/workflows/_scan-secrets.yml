name: "Módulo — Scan Secretos (Gitleaks)"

on:
  workflow_call:

permissions:
  contents: read

jobs:
  scan-secrets:
    name: "Scan Secretos — Gitleaks"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v6

      - name: Instalar Gitleaks
        run: |
          GITLEAKS_VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4 | ltrimstr v 2>/dev/null || echo "8.27.0")
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION#v}/gitleaks_${GITLEAKS_VERSION#v}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Ejecutar Gitleaks
        id: gitleaks
        run: |
          gitleaks detect \
            --source . \
            --no-git \
            --log-level info \
            --report-format json \
            --report-path gitleaks-report.json \
            --exit-code 1 || echo "LEAKS_FOUND=true" >> $GITHUB_ENV

      - name: Publicar resumen en GitHub Actions
        if: always()
        run: |
          echo "## 🔑 Gitleaks — Scan de Secretos" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ ! -f gitleaks-report.json ]; then
            TOTAL=0
          else
            TOTAL=$(jq 'length' gitleaks-report.json)
          fi

          echo "| Métrica | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔑 Secretos detectados | **${TOTAL:-0}** |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${TOTAL:-0}" = "0" ] || [ "${TOTAL:-0}" = "null" ]; then
            echo "✅ No se encontraron secretos expuestos." >> $GITHUB_STEP_SUMMARY
          else
            echo "⛔ Se encontraron **$TOTAL** secreto(s) expuesto(s)." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Regla | Archivo | Línea | Commit |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|---------|-------|--------|" >> $GITHUB_STEP_SUMMARY
            jq -r '.[] | "| `\(.RuleID)` | `\(.File)` | \(.StartLine) | \(.Commit[:8]) |"' \
              gitleaks-report.json >> $GITHUB_STEP_SUMMARY
          fi

      - name: Subir reporte Gitleaks
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: reporte-gitleaks
          path: gitleaks-report.json

      - name: Fallar si se encontraron secretos
        if: env.LEAKS_FOUND == 'true'
        run: |
          echo "⛔ Gitleaks detectó secretos expuestos. Revisa el reporte."
          exit 1
