name: Commitlint

on:
  pull_request:
    branches: [dev, qa, prd]

permissions:
  pull-requests: read
  contents: read

jobs:
  commitlint:
    name: Validar título del PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            test
            chore
            ci
            docs
            style
            build
          requireScope: false
