name: "Módulo — Release"

on:
  workflow_call:
    inputs:
      branch:
        description: "Rama a procesar"
        required: false
        type: string
        default: "dev"
    outputs:
      new_release_published:
        description: "Si se publicó una nueva versión"
        value: ${{ jobs.release.outputs.new_release_published }}
      new_release_version:
        description: "Versión publicada (ej: 1.2.3)"
        value: ${{ jobs.release.outputs.new_release_version }}

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Generar release y tag
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.release.outputs.new_release_published }}
      new_release_version: ${{ steps.release.outputs.new_release_version }}

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ inputs.branch || 'dev' }}

      - name: Configurar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Instalar dependencias
        run: npm ci

      - name: Debug branch input
        env:
          BRANCH: ${{ inputs.branch }}
        run: echo "branch input = '${BRANCH}'"

      - name: Generar release (Semantic Release)
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REF: refs/heads/${{ inputs.branch || 'dev' }}
          GITHUB_REF_NAME: ${{ inputs.branch || 'dev' }}
        run: |
          OUTPUT=$(npx semantic-release 2>&1)
          echo "$OUTPUT"
          VERSION=$(echo "$OUTPUT" | grep -oP '(?<=Published release )\S+' | head -1)
          if [ -n "$VERSION" ]; then
            echo "new_release_published=true" >> $GITHUB_OUTPUT
            echo "new_release_version=${VERSION}" >> $GITHUB_OUTPUT
          else
            echo "new_release_published=false" >> $GITHUB_OUTPUT
            echo "new_release_version=" >> $GITHUB_OUTPUT
          fi
